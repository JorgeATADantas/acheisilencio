<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achei Silêncio - Login</title>

    <link rel="stylesheet" href="estilos-login.css">
</head>

<body>
    <main id="principal">
        <section id="texto-entrada">
            <h1 id="nome-site">Achei Silêncio</h1>
            <h2 id="slogan-site"><strong>Encontre um cantinho de paz para você</strong></h2>
            <img src="imagens\estudo.png" id="imagem" alt="Imagem de uma pessoa estudando em um café">
        </section>

        <section id="login">
            <p id="texto-entrar">Entrar</p>
            <label id="rotulo-email" for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <label id="rotulo-senha" for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
            <p id="esqueceu-senha"><a href="esqueci-senha.html">Esqueci a senha</a></p>
            <button id="entrar">Entrar</button>
        
        <section id="cadastrar">
            <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </section>
    </main>
    
</body>
</html>
