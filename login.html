<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achei Silêncio - Login</title>

    <link rel="stylesheet" href="estilos-login.css">
</head>

<body>
    <main id="principal">
        <section id="texto-entrada">
            <p id="nome-site">Achei Silêncio</p>
            <p id="texto">Encontre cafés, bibliotecas e cantinhos tranquilos para estudar ou trabalhar com foco</p>
            <img src="imagens\estudo.png" id="imagem" alt="Imagem de uma pessoa estudando em um café">
        </section>

        <section id="login">
            <p id="texto-entrar">Entrar</p>
            <label id="rotulo-email" for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <label id="rotulo-senha" for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
            <p id="esqueceu-senha">Esqueci a senha</p>
            <button id="entrar">Entrar</button>
        
        <section id="cadastrar">
            <p>Ainda não tem conta? Cadastre-se aqui</p>
        </section>
    </main>
    
</body>
</html>
