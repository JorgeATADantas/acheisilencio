<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achei Silêncio - Recuperar Senha</title>
    <link rel="stylesheet" href="estilos-esqueci-senha.css">
</head>
<body>
    <main id="principal">
        <section id="cartao-recuperar">
            <h1 id="nome-site">Achei Silêncio</h1>
            
            <h2>Esqueceu sua senha?</h2>
            <p>Não se preocupe! Digite o seu e-mail abaixo e enviaremos as instruções para você criar uma nova senha.</p>
            
            <label for="email-recuperar">E-mail:</label>
            <input type="email" id="email-recuperar" placeholder="seu@email.com">
            
            <button id="enviar">Enviar link de recuperação</button>
            
            <div id="voltar">
                <a href="login.html">Voltar para o login</a>
            </div>
        </section>
    </main>
</body>
</html>
