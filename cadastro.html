<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achei Silêncio - Cadastro</title>
    
    <link rel="stylesheet" href="estilos-cadastro.css">
</head>
<body>
    <main id="principal">
        <a href="login.html" id="botao-voltar">← Voltar para o login</a>
        
        <section id="imagem-logo">
            <img src="imagens\logo-achei-silêncio.png" id="imagem" alt="Logo do nosso site">
        </section>

        <section id="cadastro">
            <p id="texto-cadastrar">Criar Conta</p>
            
            <form id="form-cadastro">
                <label class="rotulo" for="nome">Nome completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                
                <label class="rotulo" for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                
                <label class="rotulo" for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                
                <label class="rotulo" for="confirma-senha">Confirmar Senha:</label>
                <input type="password" id="confirma-senha" name="confirma-senha" required>
                
                <button type="submit" id="btn-cadastrar">Cadastrar</button>
            </form>
        
            <section id="voltar-login">
                <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            </section>
        </section>
    </main>

    <script src="cadastro.js"></script>
</body>
</html>
